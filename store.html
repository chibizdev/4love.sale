<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>4sale.love</title>
<meta name="description" content="My page on 4sale.love">
<meta property="og:title" content="4sale.love">
<meta property="og:description" content="Items, services and rentals — one link, shared with love">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Nunito:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--p:#7c3aed;--g:#16a34a;--g2:#4ade80;--ink:#0d0a18;--muted:#6b5b8a;--bg:#f5f3ef;--w:#fff;--rule:#e4dff5;--rb:linear-gradient(90deg,#ff4d4d,#ff9a00,#ffe600,#4ade80,#38bdf8,#818cf8,#e879f9);--profile-bg:#0d0d0d;--hero-text:#fff;--page-bg:#f5f3ef;--card-bg:#fff;--accent:#7c3aed;--accent2:#16a34a;--tab-accent:#7c3aed}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'Nunito',sans-serif;background:var(--page-bg);color:var(--ink);min-height:100dvh}
@keyframes rb{0%{background-position:0 0}100%{background-position:400% 0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
#loader{position:fixed;inset:0;background:var(--page-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999;transition:opacity .35s}
#loader.done{opacity:0;pointer-events:none}
.ld-logo{font-family:'Baloo 2',cursive;font-size:26px;font-weight:900;color:var(--p)}
.ld-logo span{color:var(--g)}
.ld-spin{width:28px;height:28px;border:3px solid rgba(124,58,237,.15);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite}
.sf-nav{background:var(--profile-bg);height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:100;border-bottom:3px solid transparent;border-image:var(--rb) 1}
.sf-nav-logo{font-family:'Baloo 2',cursive;font-size:17px;font-weight:900;color:#fff}
.sf-nav-logo span{color:var(--g2)}
.sf-nav-right{display:flex;align-items:center;gap:8px}
.sf-nav-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.8);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.sf-nav-btn:hover{background:rgba(255,255,255,.2)}
.sf-nav-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff}
.sf-hero{background:var(--profile-bg);padding:18px 16px 14px;position:relative;overflow:hidden}
.sf-hero-rb{position:absolute;top:0;left:0;right:0;height:3px;background:var(--rb);background-size:400%;animation:rb 3s linear infinite}
.sf-hero::after{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 60% at 90% 0%,rgba(124,58,237,.25),transparent),radial-gradient(ellipse 50% 40% at 5% 100%,rgba(22,163,74,.15),transparent)}
.sf-hero-inner{position:relative;z-index:1}
.sf-profile-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.sf-avatar{width:60px;height:60px;border-radius:18px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:26px;border:2px solid rgba(255,255,255,.15);overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.sf-avatar img{width:100%;height:100%;object-fit:cover}
.sf-info{flex:1;min-width:0}
.sf-name{font-family:'Baloo 2',cursive;font-size:22px;font-weight:900;color:var(--hero-text);line-height:1;margin-bottom:3px;letter-spacing:-.02em}
.sf-handle{font-size:11px;color:rgba(255,255,255,.4);font-family:monospace;margin-bottom:5px}
.sf-bio{font-size:12px;color:rgba(255,255,255,.65);line-height:1.5;font-weight:600}
.sf-share-pill{flex-shrink:0;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:20px;padding:7px 13px;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}
.sf-stats{display:flex;gap:20px;margin:10px 0 12px}
.sf-stat-n{font-family:'Baloo 2',cursive;font-size:20px;font-weight:900;color:#fff}
.sf-stat-l{font-size:9px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em}
.sf-cat-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.sf-cat-pill{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:800;cursor:pointer;transition:all .2s;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:rgba(255,255,255,.5);font-family:'Nunito',sans-serif}
.sf-cat-pill.on{background:var(--accent);border-color:var(--accent);color:#fff}
.sf-cat-pill.on.green{background:var(--accent2);border-color:var(--accent2)}
.sf-cat-pill.on.blue{background:#0ea5e9;border-color:#0ea5e9}
.sf-upload-zone{background:var(--page-bg);border-top:1px solid var(--rule);padding:10px 16px;display:none}
.sf-upload-zone.visible{display:block;animation:fadeUp .3s ease}
.upload-bar{display:flex;align-items:center;gap:8px;background:var(--w);border:2px dashed var(--rule);border-radius:14px;padding:10px 14px;cursor:pointer;transition:all .2s}
.upload-bar:hover{border-color:var(--accent);background:#faf8ff}
.upload-bar input{display:none}
.upload-bar-icon{font-size:20px}
.upload-bar-text{flex:1}
.upload-bar-title{font-size:13px;font-weight:800;color:var(--ink)}
.upload-bar-sub{font-size:11px;color:var(--muted);font-weight:600}
.upload-bar-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:10px;padding:7px 14px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap}
.sf-section{display:none;animation:fadeUp .25s ease}
.sf-section.visible{display:block}
.sf-section-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px}
.sf-section-label{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);display:flex;align-items:center;gap:6px}
.sf-section-count{background:var(--rule);border-radius:20px;padding:1px 8px;font-size:10px;font-weight:800;color:var(--muted)}
.sf-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 12px 12px}
.sf-grid.single{grid-template-columns:1fr}
.sf-card{background:var(--card-bg);border:1.5px solid var(--rule);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .2s;animation:fadeUp .3s ease both}
.sf-card:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 8px 24px rgba(124,58,237,.12)}
.sf-card.featured{grid-column:1/-1}
.sf-card-img{position:relative;background:linear-gradient(135deg,#efe8ff,#e8f7ed);display:flex;align-items:center;justify-content:center;font-size:36px;aspect-ratio:1;overflow:hidden;background-size:cover;background-position:center}
.sf-card.featured .sf-card-img{aspect-ratio:16/8;font-size:56px}
.sf-card-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.sf-card-cond{position:absolute;left:7px;bottom:7px;background:rgba(0,0,0,.65);color:#fff;border-radius:20px;padding:2px 8px;font-size:9px;font-weight:800;text-transform:uppercase;backdrop-filter:blur(4px)}
.sf-card-views{position:absolute;right:7px;bottom:7px;color:rgba(255,255,255,.7);font-size:9px;font-weight:700}
.sf-card-type-badge{position:absolute;top:7px;right:7px;border-radius:20px;padding:2px 8px;font-size:9px;font-weight:800}
.type-rental{background:rgba(14,165,233,.2);color:#0ea5e9;border:1px solid rgba(14,165,233,.3)}
.type-service{background:rgba(168,85,247,.2);color:#a855f7;border:1px solid rgba(168,85,247,.3)}
.type-item{background:rgba(22,163,74,.2);color:#16a34a;border:1px solid rgba(22,163,74,.3)}
.sf-card-body{padding:10px 11px 11px}
.sf-card-title{font-size:12px;font-weight:800;line-height:1.3;color:var(--ink);margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sf-card-price{font-family:'Baloo 2',cursive;font-size:19px;font-weight:900;color:var(--accent)}
.sf-card-price small{font-size:10px;color:var(--muted);font-weight:700;margin-left:2px;font-family:'Nunito',sans-serif}
.sf-card-foot{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--rule);padding-top:7px;margin-top:7px}
.sf-card-sub{font-size:10px;color:var(--muted);font-weight:700;flex:1;margin-right:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sf-offer-btn{background:var(--rule);border:none;border-radius:12px;padding:4px 10px;font-size:10px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--accent);transition:all .15s;flex-shrink:0}
.sf-offer-btn:hover{background:var(--accent);color:#fff}
.sf-rental{background:var(--card-bg);border:1.5px solid var(--rule);border-radius:16px;overflow:hidden;margin:0 12px 10px;animation:fadeUp .3s ease both}
.sf-rental-photos{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;background:var(--ink)}
.sf-rental-photos div{height:70px;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:18px;color:rgba(255,255,255,.5)}
.sf-rental-body{padding:12px}
.sf-rental-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.sf-rental-name{font-size:14px;font-weight:900;color:var(--ink);margin-bottom:2px}
.sf-rental-loc{font-size:11px;color:var(--muted);font-weight:700}
.sf-rental-price{font-family:'Baloo 2',cursive;font-size:20px;font-weight:900;color:var(--accent2);text-align:right;flex-shrink:0}
.sf-rental-price small{display:block;font-size:9px;color:var(--muted);font-weight:700;font-family:'Nunito',sans-serif}
.sf-rental-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.sf-rental-tag{background:var(--rule);border-radius:20px;padding:3px 9px;font-size:9px;font-weight:800;color:var(--muted)}
.sf-rental-btn{width:100%;background:linear-gradient(135deg,var(--accent2),#059669);color:#fff;border:none;border-radius:10px;padding:11px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}
.sf-empty{margin:0 12px 12px;border:2px dashed var(--rule);border-radius:16px;padding:32px 16px;text-align:center}
.sf-empty-icon{font-size:32px;margin-bottom:8px}
.sf-empty-title{font-size:14px;font-weight:800;color:var(--muted);margin-bottom:4px}
.sf-empty-sub{font-size:12px;color:#bbb;font-weight:600}
.sf-cta{margin:0 12px 12px;background:linear-gradient(135deg,rgba(124,58,237,.06),rgba(22,163,74,.04));border:1.5px solid rgba(124,58,237,.15);border-radius:16px;padding:20px;text-align:center}
.sf-cta-title{font-family:'Baloo 2',cursive;font-size:17px;font-weight:800;margin-bottom:4px}
.sf-cta-sub{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:14px}
.sf-cta-btn{display:inline-flex;align-items:center;gap:6px;padding:11px 24px;border-radius:24px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}
.sf-sharebar{background:var(--w);border-top:1px solid var(--rule);padding:10px 14px;display:flex;gap:7px;align-items:center;position:sticky;bottom:0;z-index:50}
.sf-share-btn{border:none;border-radius:14px;padding:8px 12px;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;color:#fff}
.btn-wa{background:#25d366}.btn-sms{background:#6366f1}.btn-fb{background:#1877f2}
.sf-copy-btn{margin-left:auto;background:var(--accent);color:#fff;border:none;border-radius:14px;padding:8px 14px;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}
.sf-footer{padding:16px;border-top:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:11px;color:#bbb}
.sf-footer a{color:var(--p);font-weight:800;text-decoration:none}
.sf-modal-bg{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);align-items:flex-end;justify-content:center}
.sf-modal-bg.open{display:flex}
.sf-modal{background:var(--w);border-radius:24px 24px 0 0;width:100%;max-width:520px;padding:22px 18px 36px;animation:slideUp .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 -12px 40px rgba(0,0,0,.15)}
.sf-modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sf-modal-title{font-family:'Baloo 2',cursive;font-size:19px;font-weight:800}
.sf-modal-close{width:32px;height:32px;border-radius:50%;background:var(--rule);border:none;color:var(--muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sf-modal label{display:flex;flex-direction:column;gap:5px;font-size:12px;font-weight:800;color:var(--ink);margin-bottom:10px}
.sf-modal input,.sf-modal textarea,.sf-modal select{width:100%;padding:10px 12px;background:var(--bg);border:1.5px solid var(--rule);border-radius:10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--ink);outline:none;transition:border-color .15s}
.sf-modal input:focus,.sf-modal textarea:focus{border-color:var(--accent)}
.sf-modal textarea{min-height:72px;resize:vertical}
.sf-modal-submit{width:100%;padding:13px;border-radius:20px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;border:none;cursor:pointer;margin-top:4px}
.qa-modal{background:#0d0a18;border-radius:24px 24px 0 0;width:100%;max-width:520px;padding:22px 18px 36px;animation:slideUp .3s cubic-bezier(.34,1.56,.64,1);color:#fff}
.qa-type-row{display:flex;gap:6px;margin-bottom:12px}
.qa-type-btn{flex:1;padding:8px 4px;border-radius:10px;border:1.5px solid #2d2545;background:transparent;color:rgba(255,255,255,.4);font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;text-align:center}
.qa-type-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(124,58,237,.12)}
.qa-type-btn.on.green{border-color:var(--g2);color:var(--g2);background:rgba(74,222,128,.1)}
.qa-type-btn.on.blue{border-color:#38bdf8;color:#38bdf8;background:rgba(56,189,248,.1)}
.qa-photo-strip{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.qa-photo-thumb{width:56px;height:56px;border-radius:8px;object-fit:cover;border:2px solid #2d2545}
.qa-photo-add{width:56px;height:56px;border-radius:8px;border:2px dashed #2d2545;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;background:transparent;color:rgba(255,255,255,.3)}
.qa-input{width:100%;padding:10px 12px;background:#1a1525;border:1.5px solid #2d2545;border-radius:10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:#fff;outline:none;margin-bottom:10px}
.qa-label{display:block;font-size:11px;font-weight:800;color:rgba(255,255,255,.5);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
</style>
</head>
<body>
<div id="loader"><div class="ld-logo">4sale.<span>love</span></div><div class="ld-spin"></div></div>

<div id="page" style="display:none">
  <nav class="sf-nav">
    <div class="sf-nav-logo">4sale.<span>love</span></div>
    <div class="sf-nav-right">
      <button class="sf-nav-btn" onclick="sfCopyLink()">Share</button>
      <button class="sf-nav-btn primary" id="nav-add-btn" onclick="openQuickAdd()" style="display:none">+ Add</button>
    </div>
  </nav>

  <div class="sf-hero" id="sf-hero">
    <div class="sf-hero-rb"></div>
    <div class="sf-hero-inner">
      <div class="sf-profile-row">
        <div class="sf-avatar" id="sf-avatar">🏠</div>
        <div class="sf-info">
          <div class="sf-name" id="sf-name">Loading</div>
          <div class="sf-handle" id="sf-handle">4sale.love/</div>
          <div class="sf-bio" id="sf-bio"></div>
        </div>
        <button class="sf-share-pill" onclick="sfCopyLink()">Share</button>
      </div>
      <div class="sf-stats">
        <div><div class="sf-stat-n" id="stat-items">0</div><div class="sf-stat-l">Items</div></div>
        <div><div class="sf-stat-n" id="stat-services">0</div><div class="sf-stat-l">Services</div></div>
        <div><div class="sf-stat-n" id="stat-rentals">0</div><div class="sf-stat-l">Rentals</div></div>
      </div>
      <div class="sf-cat-pills" id="cat-pills" style="display:none">
        <div class="sf-cat-pill on" id="pill-items" onclick="toggleCat('items')">Items</div>
        <div class="sf-cat-pill on green" id="pill-services" onclick="toggleCat('services')" style="display:none">Services</div>
        <div class="sf-cat-pill on blue" id="pill-rentals" onclick="toggleCat('rentals')" style="display:none">Rentals</div>
      </div>
    </div>
  </div>

  <div class="sf-upload-zone" id="upload-zone">
    <label class="upload-bar">
      <input type="file" accept="image/*" multiple onchange="handleQuickUpload(this.files)">
      <div class="upload-bar-icon">📸</div>
      <div class="upload-bar-text">
        <div class="upload-bar-title">Drop a photo — list it instantly</div>
        <div class="upload-bar-sub">AI identifies the item and writes the listing</div>
      </div>
      <span class="upload-bar-btn">Upload</span>
    </label>
  </div>

  <div id="sf-sections"></div>

  <div class="sf-sharebar">
    <button class="sf-share-btn btn-wa"  onclick="sfShare('whatsapp')">WhatsApp</button>
    <button class="sf-share-btn btn-sms" onclick="sfShare('sms')">Text</button>
    <button class="sf-share-btn btn-fb"  onclick="sfShare('facebook')">FB</button>
    <button class="sf-copy-btn" id="copy-btn" onclick="sfCopyLink()">Copy Link</button>
  </div>

  <footer class="sf-footer">
    <span id="sf-footer-name"></span> Powered by <a href="https://4sale.love">4sale.love</a>
    <a href="https://4sale.love">Create your page</a>
  </footer>
</div>

<!-- Offer modal -->
<div class="sf-modal-bg" id="offer-modal" onclick="if(event.target===this)closeOffer()">
  <div class="sf-modal">
    <div class="sf-modal-head">
      <div class="sf-modal-title" id="offer-title">Make an Offer</div>
      <button class="sf-modal-close" onclick="closeOffer()">x</button>
    </div>
    <label>Your Name<input id="of-name" type="text" placeholder="First and Last"></label>
    <label>Email or Phone<input id="of-contact" type="text" placeholder="Best way to reach you"></label>
    <label>Interested In<input id="of-item" type="text" placeholder="Item name"></label>
    <label>Your Offer<input id="of-price" type="text" placeholder="e.g. $200"></label>
    <label>Message<textarea id="of-msg" placeholder="Questions or details"></textarea></label>
    <button class="sf-modal-submit" onclick="submitOffer()">Send Offer</button>
  </div>
</div>

<!-- Quick add modal (owner) -->
<div class="sf-modal-bg" id="qa-modal" onclick="if(event.target===this)closeQuickAdd()">
  <div class="qa-modal">
    <div class="sf-modal-head">
      <div class="sf-modal-title" style="color:#fff">New Listing</div>
      <button class="sf-modal-close" style="background:#1a1525;color:#888" onclick="closeQuickAdd()">x</button>
    </div>
    <div class="qa-type-row">
      <button class="qa-type-btn on"  id="qa-type-item"    onclick="setQAType('item')">Item</button>
      <button class="qa-type-btn"     id="qa-type-service" onclick="setQAType('service')">Service</button>
      <button class="qa-type-btn"     id="qa-type-rental"  onclick="setQAType('rental')">Rental</button>
    </div>
    <div class="qa-photo-strip" id="qa-photos">
      <label style="margin:0;cursor:pointer;display:block">
        <input type="file" accept="image/*" multiple style="display:none" onchange="addQAPhotos(this.files)">
        <div class="qa-photo-add">+Photo</div>
      </label>
    </div>
    <div class="qa-label">Title</div>
    <input class="qa-input" id="qa-title" type="text" placeholder="What are you listing?">
    <div class="qa-label">Description</div>
    <textarea class="qa-input" id="qa-desc" placeholder="Details, condition, whats included" style="min-height:60px;resize:vertical"></textarea>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <div style="flex:1"><div class="qa-label">Price $</div><input class="qa-input" id="qa-price" type="number" placeholder="0" style="margin:0"></div>
      <div style="flex:1"><div class="qa-label">Condition</div><select class="qa-input" id="qa-cond" style="margin:0"><option>New</option><option>Like New</option><option selected>Good</option><option>Fair</option></select></div>
    </div>
    <button id="qa-ai-btn" onclick="qaGenerate()" style="width:100%;padding:11px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#16a34a);color:#fff;border:none;font-family:Nunito,sans-serif;font-size:13px;font-weight:800;cursor:pointer;margin-bottom:8px">Generate with AI</button>
    <button onclick="qaSave()" style="width:100%;padding:11px;border-radius:12px;background:#1a1525;border:1.5px solid #2d2545;color:rgba(255,255,255,.7);font-family:Nunito,sans-serif;font-size:13px;font-weight:800;cursor:pointer">Save Listing</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SB_URL='https://sbwcjvdhacxkxbrckanv.supabase.co';
const SB_KEY='sb_publishable_B19hwQ9hhcfx3-O6SAqxRw_TLslozqo';
const sb=supabase.createClient(SB_URL,SB_KEY);
const RESERVED=new Set(['app','auth','login','admin','dashboard','builder','api','embed']);
const handle=location.pathname.replace(/^\/|\/$/g,'').split('/')[0].toLowerCase();
let profile=null,listings=[],isOwner=false,catState={items:true,services:true,rentals:true},qaType='item',qaPhotos=[];

(async()=>{
  if(!handle||RESERVED.has(handle)){showNotFound();return;}
  try{
    const{data:u,error}=await sb.from('users').select('*').eq('username',handle).single();
    if(error||!u){showNotFound();return;}
    profile=u;
    const{data:l}=await sb.from('listings').select('*').eq('user_id',u.id).eq('status','active').order('created_at',{ascending:false});
    listings=l||[];
    const{data:{session}}=await sb.auth.getSession();
    isOwner=session?.user?.id===u.id;
    render();
  }catch(e){console.error(e);showNotFound();}
})();

function render(){
  if(!profile)return;
  let D={};try{D=JSON.parse(profile.design||'{}')}catch(e){}
  applyDesign(D);
  const name=profile.store_name||profile.username||handle;
  document.title=name+' - 4sale.love';
  document.getElementById('sf-name').textContent=name;
  document.getElementById('sf-handle').textContent='4sale.love/'+profile.username;
  document.getElementById('sf-bio').textContent=profile.bio||'';
  document.getElementById('sf-footer-name').textContent=name+' · ';
  const av=document.getElementById('sf-avatar');
  if(profile.avatar?.startsWith('http'))av.innerHTML=`<img src="${profile.avatar}" alt="">`;
  else av.textContent=profile.avatar||'🏠';
  document.querySelector('meta[property="og:title"]').content=name;
  if(profile.bio)document.querySelector('meta[property="og:description"]').content=profile.bio;
  const items=listings.filter(l=>!l.type||l.type==='item');
  const services=listings.filter(l=>l.type==='service');
  const rentals=listings.filter(l=>l.type==='rental');
  document.getElementById('stat-items').textContent=items.length;
  document.getElementById('stat-services').textContent=services.length;
  document.getElementById('stat-rentals').textContent=rentals.length;
  document.getElementById('cat-pills').style.display='flex';
  if(services.length)document.getElementById('pill-services').style.display='';
  if(rentals.length)document.getElementById('pill-rentals').style.display='';
  if(isOwner){document.getElementById('upload-zone').classList.add('visible');document.getElementById('nav-add-btn').style.display='';}
  renderSections(items,services,rentals);
  document.getElementById('page').style.display='block';
  hideLoader();
}

function renderSections(items,services,rentals){
  const el=document.getElementById('sf-sections');el.innerHTML='';
  if(catState.items){
    const sec=document.createElement('div');sec.className='sf-section visible';sec.id='sec-items';
    if(items.length){sec.innerHTML=`<div class="sf-section-head"><div class="sf-section-label">For Sale <span class="sf-section-count">${items.length}</span></div></div><div class="sf-grid${items.length===1?' single':''}">${items.map((l,i)=>renderCard(l,i===0&&items.length>2)).join('')}</div>`;}
    else if(isOwner){sec.innerHTML=`<div class="sf-empty"><div class="sf-empty-icon">🏷️</div><div class="sf-empty-title">No items yet</div><div class="sf-empty-sub">Tap + Add or drop a photo to list something</div></div>`;}
    if(sec.innerHTML)el.appendChild(sec);
  }
  if(catState.services&&services.length){
    const sec=document.createElement('div');sec.className='sf-section visible';sec.id='sec-services';
    sec.innerHTML=`<div class="sf-section-head"><div class="sf-section-label">Services <span class="sf-section-count">${services.length}</span></div></div><div class="sf-grid${services.length===1?' single':''}">${services.map((l,i)=>renderCard(l,i===0&&services.length>2)).join('')}</div>`;
    el.appendChild(sec);
  }
  if(catState.rentals&&rentals.length){
    const sec=document.createElement('div');sec.className='sf-section visible';sec.id='sec-rentals';
    sec.innerHTML=`<div class="sf-section-head"><div class="sf-section-label">Rentals <span class="sf-section-count">${rentals.length}</span></div></div>${rentals.map(l=>renderRental(l)).join('')}`;
    el.appendChild(sec);
  }
  const cta=document.createElement('div');
  cta.innerHTML=`<div class="sf-cta"><div class="sf-cta-title">Don't see what you need?</div><div class="sf-cta-sub">Custom requests and bundles welcome.</div><button class="sf-cta-btn" onclick="openOffer('','')">Send a Message</button></div>`;
  el.appendChild(cta);
}

function renderCard(l,featured){
  const photos=parseJSON(l.photos,[]);
  const imgUrl=l.photo_url||photos[0]||'';
  const emoji=l.emoji||(l.type==='service'?'🔧':l.type==='rental'?'🏠':'📦');
  const typeCls=l.type==='service'?'type-service':l.type==='rental'?'type-rental':'type-item';
  const typeLabel=l.type==='service'?'Service':l.type==='rental'?'Rental':'Item';
  const suffix=l.type==='rental'?'/hr':l.type==='service'?'/session':'';
  return `<div class="sf-card${featured?' featured':''}" onclick="openOffer('${esc(l.title)}','$${l.price}')">
    <div class="sf-card-img"${imgUrl?` style="background-image:url('${esc(imgUrl)}');background-size:cover;background-position:center"`:''}>
      ${imgUrl?'':`<span style="font-size:${featured?'52':'36'}px">${emoji}</span>`}
      ${l.condition?`<div class="sf-card-cond">${esc(l.condition)}</div>`:''}
      ${l.views?`<div class="sf-card-views">${l.views} views</div>`:''}
      <div class="sf-card-type-badge ${typeCls}">${typeLabel}</div>
    </div>
    <div class="sf-card-body">
      <div class="sf-card-title">${esc(l.title)}</div>
      <div class="sf-card-price">$${l.price}<small>${suffix}</small></div>
      <div class="sf-card-foot">
        <span class="sf-card-sub">${esc((l.description||'').slice(0,42))||'Make an offer'}</span>
        <button class="sf-offer-btn" onclick="event.stopPropagation();openOffer('${esc(l.title)}','$${l.price}')">Offer</button>
      </div>
    </div>
  </div>`;
}

function renderRental(l){
  const photos=parseJSON(l.photos,[]);
  const tags=parseJSON(l.tags,[]);
  const bgC=['#0d0d1a','#0a1f12','#1a0a2e','#1a1a0a'];
  const bgE=['🏙️','🎥','🎤','🛋️'];
  const slots=[0,1,2,3].map(i=>photos[i]?`<div style="background-image:url('${esc(photos[i])}');background-size:cover"></div>`:`<div style="background:${bgC[i]}">${bgE[i]}</div>`).join('');
  return `<div class="sf-rental">
    <div class="sf-rental-photos">${slots}</div>
    <div class="sf-rental-body">
      <div class="sf-rental-top">
        <div><div class="sf-rental-name">${esc(l.title)}</div><div class="sf-rental-loc">📍 ${esc(l.location||profile?.city||'')}</div></div>
        <div class="sf-rental-price">$${l.price}<small>starting</small></div>
      </div>
      <div class="sf-rental-tags">${tags.map(t=>`<span class="sf-rental-tag">${esc(t)}</span>`).join('')}</div>
      <button class="sf-rental-btn" onclick="openOffer('${esc(l.title)}','$${l.price}')">Book / Inquire →</button>
    </div>
  </div>`;
}

function applyDesign(D){
  const r=document.documentElement;
  if(D.profileBg){r.style.setProperty('--profile-bg',D.profileBg);document.getElementById('sf-hero').style.background=D.profileBg;}
  if(D.pageBg){r.style.setProperty('--page-bg',D.pageBg);document.body.style.background=D.pageBg;}
  if(D.cardBg)r.style.setProperty('--card-bg',D.cardBg);
  if(D.heroText)r.style.setProperty('--hero-text',D.heroText);
  if(D.accent)r.style.setProperty('--accent',D.accent);
  if(D.green)r.style.setProperty('--accent2',D.green);
}

function toggleCat(cat){
  catState[cat]=!catState[cat];
  const pill=document.getElementById('pill-'+cat);
  catState[cat]?pill.classList.add('on'):pill.classList.remove('on');
  const items=listings.filter(l=>!l.type||l.type==='item');
  const services=listings.filter(l=>l.type==='service');
  const rentals=listings.filter(l=>l.type==='rental');
  renderSections(items,services,rentals);
}

function openOffer(item,price){
  document.getElementById('of-item').value=item;
  document.getElementById('of-price').value=price;
  document.getElementById('of-name').value='';
  document.getElementById('of-contact').value='';
  document.getElementById('of-msg').value='';
  document.getElementById('offer-title').textContent=item?'Offer on '+item:'Send a Message';
  document.getElementById('offer-modal').classList.add('open');
}
function closeOffer(){document.getElementById('offer-modal').classList.remove('open');}

async function submitOffer(){
  const n=document.getElementById('of-name').value.trim();
  const c=document.getElementById('of-contact').value.trim();
  const item=document.getElementById('of-item').value.trim();
  const price=document.getElementById('of-price').value.trim();
  const msg=document.getElementById('of-msg').value.trim();
  if(!n||!c){alert('Please fill in your name and contact.');return;}
  closeOffer();
  sfToast('Sending...','#7c3aed');
  try{
    const offerNum=parseFloat(String(price).replace(/[^0-9.]/g,''))||null;
    const{data:offer}=await sb.from('negotiations').insert({
      seller_handle:handle,buyer_name:n,buyer_contact:c,
      item_title:item,offer_price:offerNum,
      ask_price:listings.find(l=>l.title===item)?.price||null,
      message:msg,status:'pending',created_at:new Date().toISOString(),
    }).select().single();
    const reply=await sfNegAgent({offer,item,price,buyerName:n,message:msg});
    sfToast(reply,'#7c3aed',8000);
  }catch(e){sfToast('Message sent! You\'ll hear back soon.','#16a34a');}
}

async function sfNegAgent({offer,item,price,buyerName,message}){
  const l=listings.find(x=>x.title===item);
  const ask=l?.price?parseFloat(l.price):0;
  const ofr=parseFloat(String(price||0).replace(/[^0-9.]/g,''))||0;
  const cond=l?.condition||'Good';
  const sn=profile?.store_name||handle;
  const pct=ask>0&&ofr>0?(ofr/ask)*100:0;
  const stance=pct===0?'inquiry':pct>=95?'accept':pct>=80?'light_counter':pct>=60?'firm_counter':'decline_counter';
  const gk=localStorage.getItem('4sale_groq_key')||'';
  if(gk){
    try{
      const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Authorization':'Bearer '+gk,'Content-Type':'application/json'},body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:180,temperature:0.75,messages:[{role:'system',content:`You are a seller agent for "${sn}". NEVER say floor price. Argue VALUE. 2-3 sentences. Sign off with store name.`},{role:'user',content:`Item:${item}\nCondition:${cond}\nAsking:$${ask}\nOffer:${ofr>0?'$'+ofr:'inquiry'}\nMessage:"${message}"\nStance:${stance}`}]})});
      if(res.ok){const d=await res.json();const r=d.choices?.[0]?.message?.content?.trim();if(r){await sb.from('negotiations').update({agent_reply:r,status:'replied',replied_at:new Date().toISOString()}).eq('id',offer?.id);return r;}}
    }catch(e){}
  }
  const c88=Math.round(ask*.88),c92=Math.round(ask*.92);
  const m={inquiry:`Hey ${buyerName}! Thanks for your interest in ${item||'this'} — it's ${cond} condition, listed at $${ask}. Happy to answer questions. — ${sn}`,accept:`${buyerName}, deal! $${ofr} works for the ${item}. Let's sort the details. — ${sn}`,light_counter:`Hey ${buyerName}, appreciate the offer! The ${item} is ${cond} and priced right at $${ask} — these go for more used. I can do $${c92}. — ${sn}`,firm_counter:`Hey ${buyerName}, the ${item} is genuinely worth $${ask} — it's ${cond} and costs more to replace. Best I can do is $${c88}. — ${sn}`,decline_counter:`${buyerName}, $${ofr} is well below what the ${item} is worth. It's ${cond} at $${ask} for a reason. If you can do $${c88} I'd consider it. — ${sn}`};
  const reply=m[stance]||m.inquiry;
  await sb.from('negotiations').update({agent_reply:reply,status:'replied',replied_at:new Date().toISOString()}).eq('id',offer?.id).catch(()=>{});
  return reply;
}

function openQuickAdd(){document.getElementById('qa-modal').classList.add('open');}
function closeQuickAdd(){
  document.getElementById('qa-modal').classList.remove('open');
  qaPhotos=[];
  document.getElementById('qa-photos').innerHTML=`<label style="margin:0;cursor:pointer;display:block"><input type="file" accept="image/*" multiple style="display:none" onchange="addQAPhotos(this.files)"><div class="qa-photo-add">+Photo</div></label>`;
  ['qa-title','qa-desc','qa-price'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
}

function setQAType(type){
  qaType=type;
  ['item','service','rental'].forEach(t=>{
    const btn=document.getElementById('qa-type-'+t);
    btn.classList.remove('on','green','blue');
    if(t===type){btn.classList.add('on');if(t==='service')btn.classList.add('green');if(t==='rental')btn.classList.add('blue');}
  });
}

function addQAPhotos(files){
  for(const file of[...files].slice(0,6-qaPhotos.length)){
    const reader=new FileReader();
    reader.onload=e=>{qaPhotos.push(e.target.result);refreshQAPhotos();};
    reader.readAsDataURL(file);
  }
}

function refreshQAPhotos(){
  const strip=document.getElementById('qa-photos');
  const thumbs=qaPhotos.map((b64,i)=>`<img class="qa-photo-thumb" src="${b64}" onclick="qaPhotos.splice(${i},1);refreshQAPhotos()" title="Remove">`).join('');
  const add=qaPhotos.length<6?`<label style="margin:0;cursor:pointer;display:block"><input type="file" accept="image/*" multiple style="display:none" onchange="addQAPhotos(this.files)"><div class="qa-photo-add">+</div></label>`:'';
  strip.innerHTML=thumbs+add;
}

function handleQuickUpload(files){if(!files.length)return;qaPhotos=[];openQuickAdd();addQAPhotos(files);}

async function qaGenerate(){
  const gk=localStorage.getItem('4sale_groq_key')||'';
  if(!gk){sfToast('Add your Groq key in the admin Settings','#f59e0b');return;}
  const btn=document.getElementById('qa-ai-btn');
  btn.textContent='Generating...';btn.disabled=true;
  try{
    let vd='';
    if(qaPhotos.length){
      const vr=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Authorization':'Bearer '+gk,'Content-Type':'application/json'},body:JSON.stringify({model:'meta-llama/llama-4-scout-17b-16e-instruct',max_tokens:250,messages:[{role:'user',content:[{type:'image_url',image_url:{url:qaPhotos[0]}},{type:'text',text:'Identify this item for a marketplace listing. Brand, model, type, condition, notable features. One paragraph.'}]}]})});
      if(vr.ok){const vd2=await vr.json();vd=vd2.choices?.[0]?.message?.content?.trim()||'';}
    }
    const desc=document.getElementById('qa-desc').value;
    const price=document.getElementById('qa-price').value;
    const cond=document.getElementById('qa-cond').value;
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Authorization':'Bearer '+gk,'Content-Type':'application/json'},body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:400,temperature:0.3,messages:[{role:'user',content:[vd?'Photo: '+vd:'',desc?'Seller: '+desc:'',price?'Price: $'+price:'','Condition: '+(cond||'Good'),'Type: '+qaType,'Respond ONLY with JSON: {"title":"...","description":"...","price":0,"emoji":"emoji"}'].filter(Boolean).join('\n')}]})});
    if(res.ok){
      const d=await res.json();
      let raw=d.choices?.[0]?.message?.content?.trim().replace(/```json|```/g,'').trim();
      const js=raw?.indexOf('{'),je=raw?.lastIndexOf('}');
      if(js>=0)raw=raw.slice(js,je+1);
      const p=JSON.parse(raw);
      if(p.title)document.getElementById('qa-title').value=p.title;
      if(p.description)document.getElementById('qa-desc').value=p.description;
      if(p.price&&!price)document.getElementById('qa-price').value=p.price;
      sfToast('Generated! Review and save.','#16a34a');
    }
  }catch(e){sfToast('Error: '+e.message,'#dc2626');}
  finally{btn.textContent='Generate with AI';btn.disabled=false;}
}

async function qaSave(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){sfToast('Please log in first','#f59e0b');return;}
  const title=document.getElementById('qa-title').value.trim();
  const desc=document.getElementById('qa-desc').value.trim();
  const price=parseFloat(document.getElementById('qa-price').value)||0;
  const cond=document.getElementById('qa-cond').value;
  if(!title){sfToast('Add a title first','#f59e0b');return;}
  sfToast('Saving...','#7c3aed');
  let photo_url=null,photos_arr=[];
  for(let i=0;i<qaPhotos.length;i++){
    try{
      const blob=await fetch(qaPhotos[i]).then(r=>r.blob());
      const path=`${session.user.id}/${Date.now()}-${i}.jpg`;
      const{data:up}=await sb.storage.from('listing-photos').upload(path,blob,{contentType:'image/jpeg',upsert:true});
      if(up){const{data:{publicUrl}}=sb.storage.from('listing-photos').getPublicUrl(path);if(i===0)photo_url=publicUrl;photos_arr.push(publicUrl);}
    }catch(e){console.warn('Photo:',e.message);}
  }
  const{data,error}=await sb.from('listings').insert({user_id:session.user.id,title,description:desc,price,condition:cond,type:qaType,status:'active',photo_url,photos:photos_arr,created_at:new Date().toISOString()}).select().single();
  if(error){sfToast('Error: '+error.message,'#dc2626');return;}
  listings.unshift(data);
  closeQuickAdd();
  sfToast('Listed!','#16a34a');
  const items=listings.filter(l=>!l.type||l.type==='item');
  const services=listings.filter(l=>l.type==='service');
  const rentals=listings.filter(l=>l.type==='rental');
  document.getElementById('stat-items').textContent=items.length;
  document.getElementById('stat-services').textContent=services.length;
  document.getElementById('stat-rentals').textContent=rentals.length;
  if(services.length)document.getElementById('pill-services').style.display='';
  if(rentals.length)document.getElementById('pill-rentals').style.display='';
  renderSections(items,services,rentals);
}

function sfShare(ch){const url=location.href;const name=profile?.store_name||handle;const msg=encodeURIComponent(name+' - '+url);const map={whatsapp:'https://wa.me/?text='+msg,sms:'sms:?body='+msg,facebook:'https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(url)};if(map[ch])window.open(map[ch],'_blank');}
function sfCopyLink(){navigator.clipboard.writeText(location.href).catch(()=>{});const btn=document.getElementById('copy-btn');if(btn){btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy Link',2500);}sfToast('Link copied!','#7c3aed');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function parseJSON(v,def){try{return Array.isArray(v)?v:(typeof v==='string'?JSON.parse(v):def);}catch(e){return def;}}
function sfToast(msg,color,dur){const t=document.createElement('div');Object.assign(t.style,{position:'fixed',bottom:'76px',right:'14px',left:'14px',zIndex:'999',background:color||'#16a34a',color:'#fff',padding:'13px 16px',borderRadius:'14px',fontSize:'13px',fontWeight:'700',lineHeight:'1.4',fontFamily:'Nunito,sans-serif',boxShadow:'0 8px 24px rgba(0,0,0,.25)',transition:'opacity .4s'});t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),400)},dur||3500);}
function showNotFound(){document.getElementById('loader').classList.add('done');document.getElementById('page').style.display='block';document.getElementById('page').innerHTML='<div style="text-align:center;padding:80px 24px"><div style="font-family:Baloo 2,cursive;font-size:52px;font-weight:900;color:#7c3aed">404</div><p style="font-size:16px;color:#888;font-weight:700;margin:8px 0 24px">This page does not exist yet.</p><a href="https://4sale.love" style="display:inline-flex;align-items:center;gap:6px;padding:12px 24px;background:linear-gradient(135deg,#7c3aed,#16a34a);color:#fff;border-radius:24px;font-size:14px;font-weight:800;text-decoration:none">Create your page</a></div>';}
function hideLoader(){const l=document.getElementById('loader');l.classList.add('done');setTimeout(()=>l.style.display='none',400);}
</script>
