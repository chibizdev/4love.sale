<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>4sale.love</title>
<meta name="description" content="Personal commerce page on 4sale.love">
<meta property="og:title" content="4sale.love">
<meta property="og:description" content="Items, services & rentals — one shareable link">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--p:#7c3aed;--g:#16a34a;--g2:#4ade80;--ink:#1a0a2e;--muted:#7c5abf;--bg:#f5f3ef;--w:#fff;--rule:#e8e4dc;--rb:linear-gradient(90deg,#ff4d4d,#ff9a00,#ffe600,#4ade80,#38bdf8,#818cf8,#e879f9)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--ink);min-height:100dvh;font-size:14px}
@keyframes rbShift{0%{background-position:0 0}100%{background-position:300% 0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── LOADER ── */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;transition:opacity .3s}
#loader.done{opacity:0;pointer-events:none}
.loader-logo{font-family:'Baloo 2',cursive;font-size:28px;font-weight:900;color:var(--p)}
.loader-logo span{color:var(--g)}
.loader-spin{width:32px;height:32px;border:3px solid var(--rule);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite}

/* ── NOT FOUND ── */
#not-found{display:none;text-align:center;padding:80px 24px;animation:fadeUp .4s ease}
#not-found h1{font-family:'Baloo 2',cursive;font-size:48px;font-weight:900;color:var(--p);margin-bottom:8px}
#not-found p{font-size:16px;color:var(--muted);font-weight:700;margin-bottom:24px}
#not-found a{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:linear-gradient(135deg,var(--p),var(--g));color:#fff;border-radius:24px;font-size:14px;font-weight:800;text-decoration:none}

/* ── STOREFRONT ── */
#storefront{display:none;animation:fadeUp .4s ease}

/* NAV */
.sf-nav{background:var(--ink);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:50px;position:sticky;top:0;z-index:100;border-bottom:3px solid transparent;border-image:var(--rb) 1}
.sf-logo{font-family:'Baloo 2',cursive;font-size:17px;font-weight:800;color:#fff}
.sf-logo span{color:var(--g2)}
.sf-nav-links{display:flex;gap:3px}
.sf-nav-link{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:800;cursor:pointer;color:rgba(255,255,255,.4);text-decoration:none;transition:all .15s}
.sf-nav-link:hover,.sf-nav-link.on{background:var(--accent,#7c3aed);color:var(--accent-text,#fff)}
.sf-cta-nav{background:linear-gradient(135deg,var(--accent,#7c3aed),var(--green,#16a34a));color:var(--accent-text,#fff);border:none;border-radius:20px;padding:7px 16px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}

/* PROFILE HEADER */
.sf-header{padding:22px 16px 16px;position:relative;overflow:hidden;background:var(--profile-bg,#0d0d0d);color:var(--hero-text,#fff)}
.sf-header::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 85% 10%,rgba(129,140,248,.2),transparent 40%),radial-gradient(circle at 10% 80%,rgba(74,222,128,.1),transparent 40%)}
.sf-header>*{position:relative;z-index:1}
.sf-rain{position:absolute;top:0;left:0;right:0;height:3px;background:var(--rb);background-size:300%;animation:rbShift 3s linear infinite;z-index:2}
.sf-topline{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.sf-avatar{width:58px;height:58px;border-radius:18px;background:linear-gradient(135deg,var(--accent,#7c3aed),var(--green,#16a34a));display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;border:2px solid rgba(255,255,255,.15)}
.sf-name{font-family:'Baloo 2',cursive;font-size:22px;font-weight:800;color:var(--hero-text,#fff);line-height:1;margin-bottom:3px}
.sf-handle{font-size:11px;color:rgba(255,255,255,.45);font-family:monospace;margin-bottom:5px}
.sf-bio{font-size:12px;line-height:1.5;color:rgba(255,255,255,.7)}
.sf-share-pill{margin-left:auto;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:18px;padding:7px 13px;font-size:10px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;flex-shrink:0}
.sf-statrow{display:flex;gap:20px;margin:12px 0 10px}
.sf-statn{font-size:20px;font-weight:800;color:var(--hero-text,#fff)}
.sf-statl{font-size:9px;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.35)}
.sf-badges{display:flex;gap:6px;flex-wrap:wrap}
.sf-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:rgba(255,255,255,.8)}

/* TABS */
.sf-tabs{display:flex;background:var(--tab-bg,#fff);border-bottom:1.5px solid var(--rule);position:sticky;top:50px;z-index:10}
.sf-tab{flex:1;padding:11px 4px;border:none;background:transparent;font-size:11px;font-weight:800;cursor:pointer;border-bottom:2.5px solid transparent;color:#aaa;font-family:'Nunito',sans-serif;transition:all .15s}
.sf-tab.on{color:var(--tab-accent,#0ea5e9);border-bottom-color:var(--tab-accent,#0ea5e9)}
.sf-panel{display:none;animation:fadeUp .2s ease}
.sf-panel.on{display:block}

/* MARKET */
.sf-market{padding:12px;background:var(--page-bg,#f5f3ef)}
.sf-plabel{font-size:9px;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.sf-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sf-item{background:var(--card-bg,#fff);border:1.5px solid var(--rule);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s}
.sf-item:hover{transform:translateY(-2px);border-color:var(--accent,#7c3aed)}
.sf-item.full{grid-column:1/-1}
.sf-item-img{aspect-ratio:1;background:var(--item-bg,linear-gradient(135deg,#efe8ff,#e8f7ed));display:flex;align-items:center;justify-content:center;font-size:36px;position:relative;background-size:cover;background-position:center}
.sf-item.full .sf-item-img{aspect-ratio:16/7;font-size:52px}
.sf-cond{position:absolute;left:6px;bottom:6px;background:rgba(13,13,13,.75);color:#fff;border-radius:20px;padding:2px 7px;font-size:8px;font-weight:800;text-transform:uppercase}
.sf-views{position:absolute;right:6px;bottom:6px;color:rgba(255,255,255,.8);font-size:9px;font-weight:700}
.sf-item-body{padding:10px}
.sf-item-title{font-size:11px;font-weight:800;line-height:1.3;margin-bottom:5px;color:var(--ink);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sf-price{font-size:18px;font-weight:900;color:var(--accent,#7c3aed)}
.sf-item-foot{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--rule);padding-top:6px;margin-top:6px}
.sf-item-foot span{font-size:9px;color:#888;font-weight:700;flex:1;margin-right:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sf-offer-btn{background:var(--soft-bg,#f5f3ef);border:1.5px solid var(--rule);border-radius:20px;padding:4px 10px;font-size:9px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;flex-shrink:0;transition:all .15s}
.sf-offer-btn:hover{background:var(--accent,#7c3aed);color:#fff;border-color:var(--accent,#7c3aed)}
.sf-empty{grid-column:1/-1;padding:36px 16px;text-align:center;color:#aaa;font-size:22px;display:flex;flex-direction:column;align-items:center;gap:8px;border:1.5px dashed var(--rule);border-radius:14px}
.sf-empty p{font-size:13px;font-weight:700}

/* SERVICES */
.sf-services{padding:12px;background:var(--page-bg,#f5f3ef)}
.sf-svc{display:flex;align-items:center;gap:10px;background:var(--card-bg,#fff);border:1.5px solid var(--rule);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.sf-svc:hover{border-color:var(--accent,#7c3aed)}
.sf-svc-icon{font-size:22px;flex-shrink:0}
.sf-svc-title{font-size:12px;font-weight:800;margin-bottom:2px;color:var(--ink)}
.sf-svc-price{font-size:10px;color:var(--green,#16a34a);font-weight:800}
.sf-quote{margin-left:auto;background:var(--green,#16a34a);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:10px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;flex-shrink:0}

/* RENTALS */
.sf-rentals{padding:12px;background:var(--page-bg,#f5f3ef)}
.sf-rental{background:var(--card-bg,#fff);border:1.5px solid var(--rule);border-radius:14px;overflow:hidden;margin-bottom:10px}
.sf-rental-photos{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;background:#111;padding:3px}
.sf-rental-photos div{height:72px;border-radius:4px;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff}
.sf-rental-body{padding:12px}
.sf-rental-top{display:flex;justify-content:space-between;gap:10px;margin-bottom:8px}
.sf-rental-name{font-size:14px;font-weight:800;margin-bottom:2px;color:var(--ink)}
.sf-rental-loc{font-size:10px;color:#888;font-weight:700}
.sf-rental-price{font-size:17px;font-weight:900;color:var(--green,#16a34a);text-align:right;flex-shrink:0}
.sf-rental-price small{display:block;font-size:9px;color:#888;font-weight:700}
.sf-rental-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.sf-rental-tag{background:var(--soft-bg,#f5f3ef);border:1px solid var(--rule);border-radius:20px;padding:2px 8px;font-size:8px;font-weight:700;color:#666}
.sf-rent-btn{width:100%;background:var(--rent-btn,#159929);color:#fff;border:none;border-radius:8px;padding:11px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}

/* CTA */
.sf-cta{padding:16px;background:var(--page-bg,#f5f3ef)}
.sf-cta-inner{background:var(--cta-bg,rgba(124,58,237,.07));border:1.5px solid var(--cta-border,rgba(124,58,237,.2));border-radius:16px;padding:22px;text-align:center}
.sf-cta-title{font-family:'Baloo 2',cursive;font-size:17px;font-weight:800;margin-bottom:6px}
.sf-cta-sub{font-size:12px;color:#888;font-weight:600;margin-bottom:14px}
.sf-cta-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.sf-btn-p{padding:10px 22px;border-radius:20px;background:linear-gradient(135deg,var(--accent,#7c3aed),var(--green,#16a34a));color:var(--accent-text,#fff);border:none;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}
.sf-btn-ghost{padding:10px 22px;border-radius:20px;border:1.5px solid var(--rule);color:var(--ink);background:transparent;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}

/* SHARE BAR */
.sf-sharebar{background:var(--share-bg,#fff);border-top:1px solid var(--rule);padding:10px 14px;display:flex;gap:6px;align-items:center;position:sticky;bottom:0;z-index:20}
.sf-social{border:none;border-radius:16px;padding:8px 12px;font-size:10px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;color:#fff}
.sf-wa{background:#25d366}.sf-tx{background:#6366f1}.sf-fb{background:#1877f2}
.sf-copy{margin-left:auto;background:var(--accent,#7c3aed);color:var(--accent-text,#fff);border:none;border-radius:16px;padding:8px 14px;font-size:10px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}

/* FOOTER */
.sf-footer{padding:16px;border-top:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:11px;color:#aaa;background:var(--page-bg,#f5f3ef)}
.sf-footer a{color:var(--p);text-decoration:none;font-weight:700}

/* MODAL */
.sf-modal-bg{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);align-items:flex-end;justify-content:center}
.sf-modal-bg.open{display:flex}
.sf-modal{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:520px;padding:24px 20px 36px;display:flex;flex-direction:column;gap:14px;box-shadow:0 -8px 40px rgba(0,0,0,.15);animation:fadeUp .3s ease}
.sf-modal-head{display:flex;align-items:center;justify-content:space-between}
.sf-modal-title{font-family:'Baloo 2',cursive;font-size:18px;font-weight:800}
.sf-modal-close{width:32px;height:32px;border-radius:50%;background:#f5f3ef;color:#666;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none}
.sf-modal-body{display:flex;flex-direction:column;gap:10px}
.sf-modal-body label{font-size:12px;font-weight:700;display:flex;flex-direction:column;gap:5px;color:var(--ink)}
.sf-modal-body input,.sf-modal-body textarea{width:100%;padding:10px 12px;background:#f5f3ef;border:1.5px solid var(--rule);border-radius:10px;font:700 13px 'Nunito',sans-serif;color:var(--ink);outline:none;transition:border-color .15s}
.sf-modal-body input:focus,.sf-modal-body textarea:focus{border-color:var(--accent,#7c3aed)}
.sf-modal-body textarea{resize:vertical;min-height:80px}
.sf-modal-submit{width:100%;padding:13px;border-radius:999px;background:linear-gradient(135deg,var(--accent,#7c3aed),var(--green,#16a34a));color:var(--accent-text,#fff);font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;border:none;cursor:pointer}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-logo">4sale.<span>love</span></div>
  <div class="loader-spin"></div>
</div>

<!-- NOT FOUND -->
<div id="not-found">
  <h1>404</h1>
  <p>This page doesn't exist (yet).</p>
  <a href="/">Create your own page on 4sale.love</a>
</div>

<!-- STOREFRONT (injected dynamically) -->
<div id="storefront"></div>

<!-- INQUIRY MODAL -->
<div class="sf-modal-bg" id="sf-modal" onclick="if(event.target===this)sfCloseModal()">
  <div class="sf-modal">
    <div class="sf-modal-head">
      <div class="sf-modal-title">Send an Inquiry</div>
      <button class="sf-modal-close" onclick="sfCloseModal()">✕</button>
    </div>
    <div class="sf-modal-body">
      <label>Your Name<input type="text" id="sf-name" placeholder="First & Last"></label>
      <label>Email or Phone<input type="text" id="sf-contact" placeholder="Best way to reach you"></label>
      <label>Interested In<input type="text" id="sf-item" placeholder="Item, service or rental"></label>
      <label>Your Offer / Budget<input type="text" id="sf-price" placeholder="e.g. $200"></label>
      <label>Message<textarea id="sf-msg" placeholder="Details, questions, special requests..."></textarea></label>
    </div>
    <button class="sf-modal-submit" onclick="sfSubmit()">Send Message ✓</button>
  </div>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://sbwcjvdhacxkxbrckanv.supabase.co';
const SUPABASE_KEY  = 'sb_publishable_B19hwQ9hhcfx3-O6SAqxRw_TLslozqo';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── RESERVED PATHS — never treated as public handles ──────────────────────
const RESERVED = new Set(['app','auth','login','admin','dashboard','builder',
  'api','robots.txt','favicon.ico','netlify.toml','_redirects','sitemap.xml']);

// ── GET HANDLE FROM URL ───────────────────────────────────────────────────
const handle = window.location.pathname.replace(/^\/|\/$/g, '').split('/')[0].toLowerCase();

// ── LOAD THE STOREFRONT ───────────────────────────────────────────────────
async function loadStorefront() {
  // Sanity checks
  if (!handle || RESERVED.has(handle)) {
    showNotFound(); return;
  }

  try {
    // Fetch user profile
    const { data: user, error: userErr } = await sb
      .from('users')
      .select('*')
      .eq('username', handle)
      .single();

    if (userErr || !user) { showNotFound(); return; }

    // Update page meta
    document.title = `${user.store_name || user.username} — 4sale.love`;
    const ogTitle = document.querySelector('meta[property="og:title"]');
    if (ogTitle) ogTitle.content = user.store_name || user.username;
    const ogDesc = document.querySelector('meta[property="og:description"]');
    if (ogDesc) ogDesc.content = user.bio || 'Check out my page on 4sale.love';

    // Fetch listings
    const { data: listings } = await sb
      .from('listings')
      .select('*')
      .eq('user_id', user.id)
      .eq('status', 'active')
      .order('created_at', { ascending: false });

    renderStorefront(user, listings || []);

  } catch(e) {
    console.error('Load error:', e);
    showNotFound();
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderStorefront(user, listings) {
  // Parse saved design tokens
  let design = {};
  try { design = JSON.parse(user.design || '{}'); } catch(e) {}

  // CSS variable defaults from design
  const profileBg  = design.profileBg  || '#0d0d0d';
  const pageBg     = design.pageBg     || '#f5f3ef';
  const cardBg     = design.cardBg     || '#ffffff';
  const softBg     = design.softBg     || '#f5f3ef';
  const heroText   = design.heroText   || '#ffffff';
  const tabBg      = design.tabBg      || '#ffffff';
  const shareBg    = design.shareBg    || '#ffffff';
  const accent     = design.accent     || '#7c3aed';
  const accentText = design.accentText || '#ffffff';
  const green      = design.green      || '#16a34a';
  const tabAccent  = design.tabAccent  || '#0ea5e9';
  const itemBg     = design.itemBg     || 'linear-gradient(135deg,#efe8ff,#e8f7ed)';
  const priceFg    = design.priceFg    || '#1a0a2e';
  const rentBtnBg  = design.rentBtnBg  || '#159929';
  const ctaBg      = design.ctaBg      || 'rgba(124,58,237,.08)';
  const ctaBorder  = design.ctaBorder  || 'rgba(124,58,237,.2)';

  // Apply CSS vars to root
  const root = document.documentElement;
  root.style.setProperty('--profile-bg',  profileBg);
  root.style.setProperty('--page-bg',     pageBg);
  root.style.setProperty('--card-bg',     cardBg);
  root.style.setProperty('--soft-bg',     softBg);
  root.style.setProperty('--hero-text',   heroText);
  root.style.setProperty('--tab-bg',      tabBg);
  root.style.setProperty('--share-bg',    shareBg);
  root.style.setProperty('--accent',      accent);
  root.style.setProperty('--accent-text', accentText);
  root.style.setProperty('--green',       green);
  root.style.setProperty('--tab-accent',  tabAccent);
  root.style.setProperty('--item-bg',     itemBg);
  root.style.setProperty('--price-fg',    priceFg);
  root.style.setProperty('--rent-btn',    rentBtnBg);
  root.style.setProperty('--cta-bg',      ctaBg);
  root.style.setProperty('--cta-border',  ctaBorder);

  document.body.style.background = pageBg;

  // Partition listings by type
  const items    = listings.filter(l => !l.type || l.type === 'item');
  const services = listings.filter(l => l.type === 'service');
  const rentals  = listings.filter(l => l.type === 'rental');

  const storeURL  = `https://4sale.love/${user.username}`;
  const storeName = user.store_name || user.username || handle;
  const avatar    = user.avatar || '🏠';
  const bio       = user.bio || '';
  const location  = user.location || '';

  // Product cards
  const productCards = items.length
    ? items.map((l, i) => `
      <div class="sf-item${i===0?' full':''}" onclick="sfOpenInquiry('${esc(l.title)}','$${l.price}')">
        <div class="sf-item-img" ${l.photo_url?`style="background-image:url('${l.photo_url}')"`:''}>
          ${l.photo_url ? '' : (l.emoji || '📦')}
          ${l.condition ? `<div class="sf-cond">${l.condition}</div>` : ''}
          ${l.views ? `<div class="sf-views">${l.views} views</div>` : ''}
        </div>
        <div class="sf-item-body">
          <div class="sf-item-title">${esc(l.title)}</div>
          <div class="sf-price">$${l.price}</div>
          <div class="sf-item-foot">
            <span>${esc((l.description||'').slice(0,45)) || 'Make an offer'}</span>
            <button class="sf-offer-btn">Offer</button>
          </div>
        </div>
      </div>`).join('')
    : '<div class="sf-empty">🏷️<p>No items listed yet</p></div>';

  // Service cards
  const svcCards = services.length
    ? services.map(l => `
      <div class="sf-svc" onclick="sfOpenInquiry('${esc(l.title)}','$${l.price}')">
        <div class="sf-svc-icon">${l.emoji||'🔧'}</div>
        <div>
          <div class="sf-svc-title">${esc(l.title)}</div>
          <div class="sf-svc-price">from $${l.price}</div>
        </div>
        <button class="sf-quote">Quote</button>
      </div>`).join('')
    : '<div class="sf-empty">🔧<p>No services listed yet</p></div>';

  // Rental cards

      if (el && window.scrollY >= el.offsetTop - 80) cur = id;

// ── HELPERS ───────────────────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function sfTab(panel, btn) {
  document.querySelectorAll('.sf-tab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.sf-panel').forEach(p => p.classList.remove('on'));
  document.getElementById('sf-panel-' + panel)?.classList.add('on');
}

function sfOpenInquiry(item, price) {
  const fi = document.getElementById('sf-item');   if (fi) fi.value = item;
  const fp = document.getElementById('sf-price');  if (fp) fp.value = price;
  const fn = document.getElementById('sf-name');   if (fn) fn.value = '';
  const fc = document.getElementById('sf-contact');if (fc) fc.value = '';
  const fm = document.getElementById('sf-msg');    if (fm) fm.value = '';
  document.getElementById('sf-modal').classList.add('open');
}
function sfCloseModal() { document.getElementById('sf-modal').classList.remove('open'); }
async function sfSubmit() {
  const n     = document.getElementById('sf-name')?.value.trim();
  const c     = document.getElementById('sf-contact')?.value.trim();
  const item  = document.getElementById('sf-item')?.value.trim();
  const price = document.getElementById('sf-price')?.value.trim();
  const msg   = document.getElementById('sf-msg')?.value.trim();
  if (!n || !c) { alert('Please fill in your name and contact info.'); return; }
  sfCloseModal();
  sfToast('Sending your offer...', '#7c3aed');
  try {
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
    const sb = createClient('https://sbwcjvdhacxkxbrckanv.supabase.co','sb_publishable_B19hwQ9hhcfx3-O6SAqxRw_TLslozqo');
    const { data: seller } = await sb.from('users').select('id,store_name,bio').eq('username', handle).single();
    let listing = null;
    if (item && seller?.id) {
      const { data: l } = await sb.from('listings').select('*').eq('user_id',seller.id).ilike('title','%'+item+'%').limit(1).single();
      listing = l;
    }
    const offerNum = parseFloat(String(price).replace(/[^0-9.]/g,'')) || null;
    const { data: offer, error: oErr } = await sb.from('negotiations').insert({
      seller_handle: handle,
      buyer_name: n, buyer_contact: c,
      item_title: item||listing?.title||'',
      offer_price: offerNum, ask_price: listing?.price||null,
      message: msg||'', status: 'pending', created_at: new Date().toISOString(),
    }).select().single();
    if (oErr) throw oErr;
    const reply = await sfNegotiationAgent({ offer, listing, seller, buyerName:n, offerPrice:price, message:msg });
    sfToast('Agent reply: ' + reply, '#7c3aed', 8000);
  } catch(e) {
    console.warn('Offer error:', e.message);
    sfToast('Message sent! You\'ll hear back shortly.', '#16a34a');
  }
}

// AI VALUE NEGOTIATION AGENT
// Defends value, not floor price. Uses Groq with value-based prompt.
async function sfNegotiationAgent({ offer, listing, seller, buyerName, offerPrice, message }) {
  const askPrice  = listing?.price ? parseFloat(listing.price) : 0;
  const offerNum  = parseFloat(String(offerPrice||0).replace(/[^0-9.]/g,'')) || 0;
  const title     = listing?.title || offer?.item_title || 'this item';
  const condition = listing?.condition || 'Good';
  const desc      = listing?.description || '';
  const storeName = seller?.store_name || handle;
  const bio       = seller?.bio || '';
  const pct = askPrice > 0 && offerNum > 0 ? (offerNum/askPrice)*100 : 0;
  const stance = pct===0?'inquiry':pct>=95?'accept':pct>=80?'light_counter':pct>=60?'firm_counter':'decline_counter';

  // Try Groq AI
  try {
    const groqKey = window._groqKey || '';
    if (!groqKey) throw new Error('no key');
    const systemLines = [
      'You are a confident seller AI agent for "' + storeName + '" on 4sale.love.',
      'Rules:',
      '- NEVER say floor price or lowest I can go',
      '- ALWAYS argue the VALUE: condition, replacement cost, quality, demand',
      '- Be warm but firm. You believe in what you sell.',
      '- When countering: give a specific $ WITH a value-based reason',
      '- 2-4 sentences MAX. Conversational not formal.',
      '- Sign off with the store name',
      'Seller bio: ' + bio,
    ];
    const userLines = [
      'Item: ' + title,
      'Condition: ' + condition,
      desc ? 'Details: ' + desc : '',
      'Asking: $' + (askPrice||'N/A'),
      'Offer: ' + (offerNum>0 ? '$'+offerNum : 'No price - inquiry'),
      'Message: "' + (message||'Interested.') + '"',
      'Stance: ' + stance,
      'Write the agent reply. Argue value, not price floor.',
    ].filter(Boolean);
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer '+groqKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{role:'system',content:systemLines.join('\n')},{role:'user',content:userLines.join('\n')}],
        temperature: 0.75, max_tokens: 200,
      }),
    });
    if (!res.ok) throw new Error('groq '+res.status);
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content?.trim();
    if (reply) { await sfSaveReply(offer?.id, reply); return reply; }
  } catch(e) { console.warn('Groq:', e.message); }

  // Rule-based fallback — still argues value
  const reply = sfValueReply({ stance, buyerName, title, askPrice, offerNum, condition, storeName });
  await sfSaveReply(offer?.id, reply);
  return reply;
}

function sfValueReply({ stance, buyerName, title, askPrice, offerNum, condition, storeName }) {
  const c92 = Math.round(askPrice * 0.92);
  const c88 = Math.round(askPrice * 0.88);
  const replies = {
    inquiry:         'Hey '+buyerName+'! Thanks for your interest in '+title+' — it\'s '+condition+' condition, listed at $'+askPrice+'. Happy to answer questions. — '+storeName,
    accept:          buyerName+', deal! $'+offerNum+' works for the '+title+'. Let\'s sort the details. — '+storeName,
    light_counter:   'Hey '+buyerName+', appreciate the offer! The '+title+' is '+condition+' and priced right at $'+askPrice+' — these go for more used. I can do $'+c92+' to make it work, but that\'s about as far as I can stretch without losing on it. — '+storeName,
    firm_counter:    'Hey '+buyerName+', I hear you — but the '+title+' is genuinely worth $'+askPrice+'. It\'s '+condition+' and would cost significantly more to replace. Best I can do is $'+c88+' — I\'d rather it go to someone who appreciates it. — '+storeName,
    decline_counter: buyerName+', appreciate the reach-out but $'+offerNum+' is well below what the '+title+' is worth — it\'s '+condition+' and $'+askPrice+' is already fair. If you can do $'+c88+' I\'d consider it, but I\'m not in a rush. — '+storeName,
  };
  return replies[stance] || 'Hey '+buyerName+', thanks for reaching out about the '+title+'! Let\'s talk. — '+storeName;
}

async function sfSaveReply(offerId, reply) {
  if (!offerId) return;
  try {
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
    const sb = createClient('https://sbwcjvdhacxkxbrckanv.supabase.co','sb_publishable_B19hwQ9hhcfx3-O6SAqxRw_TLslozqo');
    await sb.from('negotiations').update({ agent_reply:reply, status:'replied', replied_at:new Date().toISOString() }).eq('id',offerId);
  } catch(e) { console.warn('save reply:',e.message); }
}

function sfToast(msg, color, duration) {
  const el = document.createElement('div');
  Object.assign(el.style, {
    position:'fixed', bottom:'80px', right:'16px', left:'16px', zIndex:'999',
    background:color||'#16a34a', color:'#fff', padding:'14px 18px',
    borderRadius:'16px', fontSize:'13px', fontWeight:'700', lineHeight:'1.5',
    fontFamily:'Nunito,sans-serif', boxShadow:'0 8px 24px rgba(0,0,0,.3)', transition:'opacity .4s',
  });
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; setTimeout(()=>el.remove(),400); }, duration||3500);
}

function sfShare(ch) {
  const url  = window.location.href;
  const name = document.title.replace(' — 4sale.love','');
  const msg  = encodeURIComponent(name + ' — ' + url);
  const map  = {
    whatsapp: 'https://wa.me/?text=' + msg,
    sms:      'sms:?body=' + msg,
    facebook: 'https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(url),
  };
  if (map[ch]) window.open(map[ch], '_blank');
}

function sfCopyLink() {
  navigator.clipboard.writeText(window.location.href).catch(()=>{});
  const b = document.getElementById('sf-copy-btn');
  if (b) { b.textContent = '✓ Copied!'; setTimeout(() => b.textContent = 'Copy Link', 2500); }
}

function showNotFound() {
  document.getElementById('not-found').style.display = 'block';
  hideLoader();
}
function hideLoader() {
  const l = document.getElementById('loader');
  if (l) { l.classList.add('done'); setTimeout(() => l.style.display='none', 400); }
}
