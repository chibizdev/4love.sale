[build]
  publish = "."

# ── Edge Functions ──────────────────────────────────────────────────────────
[[edge_functions]]
  path = "/api/nft/*"
  function = "nft-metadata"

# ── Redirects ───────────────────────────────────────────────────────────────
[[redirects]]
  from = "/"
  to = "/auth.html"
  status = 200
  force = true

[[redirects]]
  from = "/auth"
  to = "/auth.html"
  status = 200
  force = true

[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/embed"
  to = "/embed.html"
  status = 200

[[redirects]]
  from = "/embed/*"
  to = "/embed.html"
  status = 200

[[redirects]]
  from = "/:handle"
  to = "/store.html"
  status = 200

# ── Env vars needed for edge functions ─────────────────────────────────────
# Add SUPABASE_SERVICE_KEY in Netlify dashboard → Site config → Env vars
